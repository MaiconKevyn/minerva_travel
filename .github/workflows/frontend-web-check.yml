name: Frontend Web Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_atual/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend_atual/apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://minerva-travel.onrender.com
