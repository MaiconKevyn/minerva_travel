name: Sync Hostinger Frontend Branch

on:
  push:
    branches:
      - main
    paths:
      - frontend_atual/apps/web/**
      - .github/workflows/sync-hostinger-frontend.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync frontend subtree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          subtree_sha="$(git subtree split --prefix=frontend_atual/apps/web HEAD)"
          git push origin "${subtree_sha}:refs/heads/hostinger-frontend"
